---
configuration:
  log_level:
    name: مستوى السجل
    description: >-
      يتحكم في مستوى مخرجات السجل من قبل التطبيق ويمكن تغييره ليكون أكثر أو أقل
      تفصيلاً، وهو ما قد يكون مفيداً عندما تتعامل مع مشكلة غير معروفة. كل مستوى
      يتضمن تلقائياً رسائل المستوى الأكثر خطورة.
  ssl:
    name: SSL
    description: >-
      يفعّل/يعطّل تشفير SSL (HTTPS) للوصول المباشر إلى التطبيق. هذا الإعداد ليس
      له أي تأثير على خدمة Ingress.
  certfile:
    name: ملف الشهادة
    description: >-
      ملف الشهادة المستخدم لـ SSL. يجب تخزين الملف في الدليل `/ssl/`.
  keyfile:
    name: ملف المفتاح الخاص
    description: >-
      ملف المفتاح الخاص المستخدم لـ SSL. يجب تخزين الملف في الدليل `/ssl/`.
  leave_front_door_open:
    name: ترك الباب الأمامي مفتوحاً
    description: >-
      يعطّل المصادقة على AdGuard Home عند تفعيله. ننصح بشدة بعدم تفعيل هذا، حتى
      على شبكة داخلية. استخدمه على مسؤوليتك الخاصة!
network:
  53/udp:
    description: منفذ خادم DNS
  80/tcp:
    description: واجهة الويب (غير مطلوبة لـ Ingress)
