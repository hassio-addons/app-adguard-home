---
configuration:
  log_level:
    name: లాగ్ స్థాయి
    description: >-
      యాప్ ద్వారా లాగ్ అవుట్‌పుట్ స్థాయిని నియంత్రిస్తుంది మరియు ఎక్కువ లేదా
      తక్కువ వివరణాత్మకంగా ఉండేలా మార్చవచ్చు, ఇది మీరు తెలియని సమస్యను
      పరిష్కరించేటప్పుడు ఉపయోగకరంగా ఉంటుంది. ప్రతి స్థాయి స్వయంచాలకంగా మరింత
      తీవ్రమైన స్థాయి సందేశాలను కలిగి ఉంటుంది.
  ssl:
    name: SSL
    description: >-
      యాప్‌కు ప్రత్యక్ష ప్రాప్యత కోసం గుప్తీకరించిన SSL (HTTPS) ను
      ప్రారంభిస్తుంది/నిలిపివేస్తుంది. ఈ సెట్టింగ్ Ingress సేవపై ఎటువంటి
      ప్రభావం చూపదు.
  certfile:
    name: ధృవీకరణ పత్ర ఫైల్
    description: >-
      SSL కోసం ఉపయోగించాల్సిన ధృవీకరణ పత్ర ఫైల్. ఫైల్‌ను `/ssl/` డైరెక్టరీలో
      నిల్వ చేయాలి.
  keyfile:
    name: ప్రైవేట్ కీ ఫైల్
    description: >-
      SSL కోసం ఉపయోగించాల్సిన ప్రైవేట్ కీ ఫైల్. ఫైల్‌ను `/ssl/` డైరెక్టరీలో
      నిల్వ చేయాలి.
  leave_front_door_open:
    name: ముందు తలుపు తెరిచి ఉంచండి
    description: >-
      ప్రారంభించబడినప్పుడు AdGuard Home లో ప్రామాణీకరణను నిలిపివేస్తుంది.
      అంతర్గత నెట్‌వర్క్‌లో కూడా దీన్ని ప్రారంభించవద్దని మేము గట్టిగా
      సలహా ఇస్తున్నాము. మీ స్వంత పూచీపై ఉపయోగించండి!
network:
  53/udp:
    description: DNS సర్వర్ పోర్ట్
  80/tcp:
    description: వెబ్ ఇంటర్‌ఫేస్ (Ingress కోసం అవసరం లేదు)
