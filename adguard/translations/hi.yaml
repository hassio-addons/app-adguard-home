---
configuration:
  log_level:
    name: लॉग स्तर
    description: >-
      ऐप द्वारा लॉग आउटपुट के स्तर को नियंत्रित करता है और इसे अधिक या कम
      विस्तृत होने के लिए बदला जा सकता है, जो तब उपयोगी हो सकता है जब आप किसी
      अज्ञात समस्या से निपट रहे हों। प्रत्येक स्तर स्वचालित रूप से अधिक गंभीर
      स्तर के संदेशों को शामिल करता है।
  ssl:
    name: SSL
    description: >-
      ऐप तक सीधी पहुँच के लिए एन्क्रिप्टेड SSL (HTTPS) को सक्षम/अक्षम करता है।
      इस सेटिंग का Ingress सेवा पर कोई प्रभाव नहीं पड़ता।
  certfile:
    name: प्रमाणपत्र फ़ाइल
    description: >-
      SSL के लिए उपयोग की जाने वाली प्रमाणपत्र फ़ाइल। फ़ाइल को `/ssl/`
      निर्देशिका में संग्रहीत किया जाना चाहिए।
  keyfile:
    name: निजी कुंजी फ़ाइल
    description: >-
      SSL के लिए उपयोग की जाने वाली निजी कुंजी फ़ाइल। फ़ाइल को `/ssl/`
      निर्देशिका में संग्रहीत किया जाना चाहिए।
  leave_front_door_open:
    name: सामने का दरवाज़ा खुला छोड़ें
    description: >-
      सक्षम होने पर AdGuard Home पर प्रमाणीकरण को अक्षम करता है। हम दृढ़ता से
      सलाह देते हैं कि इसे सक्षम न करें, भले ही आंतरिक नेटवर्क पर हो। अपने जोखिम
      पर उपयोग करें!
network:
  53/udp:
    description: DNS सर्वर पोर्ट
  80/tcp:
    description: वेब इंटरफ़ेस (Ingress के लिए आवश्यक नहीं)
