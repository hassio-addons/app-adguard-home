---
configuration:
  log_level:
    name: سطح گزارش
    description: >-
      سطح خروجی گزارش برنامه را کنترل می‌کند و می‌توان آن را برای جزئیات
      بیشتر یا کمتر تغییر داد، که ممکن است هنگام برخورد با یک مشکل ناشناخته
      مفید باشد. هر سطح به‌طور خودکار پیام‌های یک سطح جدی‌تر را نیز شامل
      می‌شود.
  ssl:
    name: SSL
    description: >-
      رمزگذاری SSL (HTTPS) را برای دسترسی مستقیم به برنامه فعال/غیرفعال
      می‌کند. این تنظیم تأثیری بر سرویس Ingress ندارد.
  certfile:
    name: فایل گواهی
    description: >-
      فایل گواهی مورد استفاده برای SSL. این فایل باید در پوشهٔ `/ssl/`
      ذخیره شود.
  keyfile:
    name: فایل کلید خصوصی
    description: >-
      فایل کلید خصوصی مورد استفاده برای SSL. این فایل باید در پوشهٔ `/ssl/`
      ذخیره شود.
  leave_front_door_open:
    name: باز گذاشتن درِ ورودی
    description: >-
      هنگام فعال بودن، احراز هویت را در AdGuard Home غیرفعال می‌کند. ما اکیداً
      توصیه می‌کنیم این گزینه را فعال نکنید، حتی در یک شبکهٔ داخلی. استفاده
      با مسئولیت خودتان است!
network:
  53/udp:
    description: درگاه سرور DNS
  80/tcp:
    description: رابط وب (برای Ingress لازم نیست)
