---
configuration:
  log_level:
    name: লগ স্তর
    description: >-
      অ্যাপ দ্বারা লগ আউটপুটের স্তর নিয়ন্ত্রণ করে এবং কম বা বেশি বিস্তারিত করতে
      পরিবর্তন করা যেতে পারে, যা একটি অজানা সমস্যার সাথে মোকাবিলা করার সময়
      উপকারী হতে পারে। প্রতিটি স্তর স্বয়ংক্রিয়ভাবে আরও গুরুতর স্তরের বার্তা
      অন্তর্ভুক্ত করে।
  ssl:
    name: SSL
    description: >-
      অ্যাপে সরাসরি অ্যাক্সেসের জন্য এনক্রিপ্টেড SSL (HTTPS) সক্ষম/অক্ষম করে। এই
      সেটিংসটি Ingress পরিষেবাতে কোনো প্রভাব ফেলে না।
  certfile:
    name: সার্টিফিকেট ফাইল
    description: >-
      SSL-এর জন্য ব্যবহার করার সার্টিফিকেট ফাইল। ফাইলটি অবশ্যই `/ssl/`
      ডিরেক্টরিতে সংরক্ষণ করতে হবে।
  keyfile:
    name: ব্যক্তিগত কী ফাইল
    description: >-
      SSL-এর জন্য ব্যবহার করার ব্যক্তিগত কী ফাইল। ফাইলটি অবশ্যই `/ssl/`
      ডিরেক্টরিতে সংরক্ষণ করতে হবে।
  leave_front_door_open:
    name: সামনের দরজা খোলা রাখুন
    description: >-
      সক্ষম হলে AdGuard Home-এ প্রমাণীকরণ অক্ষম করে। আমরা দৃঢ়ভাবে এটি সক্ষম না
      করার পরামর্শ দিই, এমনকি একটি অভ্যন্তরীণ নেটওয়ার্কেও। নিজের ঝুঁকিতে ব্যবহার
      করুন!
network:
  53/udp:
    description: DNS সার্ভার পোর্ট
  80/tcp:
    description: ওয়েব ইন্টারফেস (Ingress-এর জন্য প্রয়োজনীয় নয়)
