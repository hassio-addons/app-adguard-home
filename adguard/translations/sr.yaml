---
configuration:
  log_level:
    name: Ниво евидентирања
    description: >-
      Контролише ниво излаза дневника апликације и може се променити да буде
      детаљнији или мање детаљан, што може бити корисно када се суочавате са
      непознатим проблемом. Сваки ниво аутоматски укључује поруке озбиљнијег
      нивоа.
  ssl:
    name: SSL
    description: >-
      Омогућава/онемогућава шифровани SSL (HTTPS) за директан приступ
      апликацији. Ово подешавање нема утицаја на услугу Ingress.
  certfile:
    name: Датотека сертификата
    description: >-
      Датотека сертификата која се користи за SSL. Датотека мора бити
      смештена у директоријуму `/ssl/`.
  keyfile:
    name: Датотека приватног кључа
    description: >-
      Датотека приватног кључа која се користи за SSL. Датотека мора бити
      смештена у директоријуму `/ssl/`.
  leave_front_door_open:
    name: Остави улазна врата отворена
    description: >-
      Онемогућава потврду идентитета на AdGuard Home када је омогућено.
      Изричито саветујемо да ово не омогућавате, чак ни на интерној мрежи.
      Користите на сопствену одговорност!
network:
  53/udp:
    description: Порт DNS сервера
  80/tcp:
    description: Веб интерфејс (није потребан за Ingress)
