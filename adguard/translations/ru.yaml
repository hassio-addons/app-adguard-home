---
configuration:
  log_level:
    name: Уровень журналирования
    description: >-
      Управляет уровнем детализации журнала, выводимого приложением, и может
      быть изменён, чтобы быть более или менее подробным, что может быть
      полезно при работе с неизвестной проблемой. Каждый уровень автоматически
      включает сообщения более серьёзного уровня.
  ssl:
    name: SSL
    description: >-
      Включает/отключает шифрование SSL (HTTPS) для прямого доступа к
      приложению. Этот параметр не влияет на службу Ingress.
  certfile:
    name: Файл сертификата
    description: >-
      Файл сертификата, используемый для SSL. Файл должен храниться в
      каталоге `/ssl/`.
  keyfile:
    name: Файл закрытого ключа
    description: >-
      Файл закрытого ключа, используемый для SSL. Файл должен храниться в
      каталоге `/ssl/`.
  leave_front_door_open:
    name: Оставить входную дверь открытой
    description: >-
      Отключает аутентификацию в AdGuard Home, когда этот параметр включён.
      Мы настоятельно не рекомендуем включать его даже во внутренней сети.
      Используйте на свой страх и риск!
network:
  53/udp:
    description: Порт DNS-сервера
  80/tcp:
    description: Веб-интерфейс (не требуется для Ingress)
