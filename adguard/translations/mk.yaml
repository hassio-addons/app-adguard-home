---
configuration:
  log_level:
    name: Ниво на евиденција
    description: >-
      Го контролира нивото на излезот на евиденцијата од апликацијата и може да
      се промени за да биде повеќе или помалку детален, што може да биде корисно
      кога се справувате со непознат проблем. Секое ниво автоматски ги вклучува
      пораките од посериозно ниво.
  ssl:
    name: SSL
    description: >-
      Овозможува/оневозможува шифриран SSL (HTTPS) за директен пристап до
      апликацијата. Оваа поставка нема влијание врз услугата Ingress.
  certfile:
    name: Датотека со сертификат
    description: >-
      Датотеката со сертификат што ќе се користи за SSL. Датотеката мора да биде
      зачувана во директориумот `/ssl/`.
  keyfile:
    name: Датотека со приватен клуч
    description: >-
      Датотеката со приватен клуч што ќе се користи за SSL. Датотеката мора да
      биде зачувана во директориумот `/ssl/`.
  leave_front_door_open:
    name: Остави ја предната врата отворена
    description: >-
      Ја оневозможува автентикацијата на AdGuard Home кога е овозможено. Силно
      препорачуваме да не го овозможувате ова, дури и на внатрешна мрежа.
      Користете на сопствен ризик!
network:
  53/udp:
    description: Порта на DNS-серверот
  80/tcp:
    description: Веб-интерфејс (не е потребен за Ingress)
