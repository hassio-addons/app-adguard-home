---
configuration:
  log_level:
    name: ระดับการบันทึก
    description: >-
      ควบคุมระดับของผลลัพธ์การบันทึกของแอป และสามารถปรับให้แสดงรายละเอียดมากขึ้น
      หรือน้อยลงได้ ซึ่งอาจมีประโยชน์เมื่อคุณกำลังจัดการกับปัญหาที่ไม่ทราบสาเหตุ
      โดยแต่ละระดับจะรวมข้อความของระดับที่มีความรุนแรงมากกว่าไว้โดยอัตโนมัติ
  ssl:
    name: SSL
    description: >-
      เปิด/ปิดการเข้ารหัส SSL (HTTPS) สำหรับการเข้าถึงแอปโดยตรง
      การตั้งค่านี้ไม่มีผลต่อบริการ Ingress
  certfile:
    name: ไฟล์ใบรับรอง
    description: >-
      ไฟล์ใบรับรองที่จะใช้สำหรับ SSL ไฟล์นี้ต้องถูกจัดเก็บไว้ในไดเรกทอรี
      `/ssl/`
  keyfile:
    name: ไฟล์คีย์ส่วนตัว
    description: >-
      ไฟล์คีย์ส่วนตัวที่จะใช้สำหรับ SSL ไฟล์นี้ต้องถูกจัดเก็บไว้ในไดเรกทอรี
      `/ssl/`
  leave_front_door_open:
    name: เปิดประตูหน้าทิ้งไว้
    description: >-
      ปิดการตรวจสอบสิทธิ์บน AdGuard Home เมื่อเปิดใช้งาน
      เราขอแนะนำอย่างยิ่งว่าไม่ควรเปิดใช้งานสิ่งนี้
      แม้แต่ในเครือข่ายภายในก็ตาม ใช้งานด้วยความเสี่ยงของคุณเอง!
network:
  53/udp:
    description: พอร์ตเซิร์ฟเวอร์ DNS
  80/tcp:
    description: อินเทอร์เฟซเว็บ (ไม่จำเป็นสำหรับ Ingress)
