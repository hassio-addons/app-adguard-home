---
configuration:
  log_level:
    name: لاگ کی سطح
    description: >-
      ایپ کے ذریعے لاگ آؤٹ پٹ کی سطح کو کنٹرول کرتا ہے اور اسے زیادہ یا کم
      تفصیلی بنانے کے لیے تبدیل کیا جا سکتا ہے، جو کسی نامعلوم مسئلے سے نمٹنے
      کے دوران مفید ہو سکتا ہے۔ ہر سطح خود بخود زیادہ سنگین سطح کے پیغامات کو
      شامل کرتی ہے۔
  ssl:
    name: SSL
    description: >-
      ایپ تک براہ راست رسائی کے لیے خفیہ کردہ SSL (HTTPS) کو فعال/غیر فعال
      کرتا ہے۔ اس ترتیب کا Ingress سروس پر کوئی اثر نہیں ہوتا۔
  certfile:
    name: سرٹیفکیٹ فائل
    description: >-
      SSL کے لیے استعمال ہونے والی سرٹیفکیٹ فائل۔ فائل کو `/ssl/` ڈائریکٹری
      میں محفوظ کیا جانا چاہیے۔
  keyfile:
    name: نجی کلید کی فائل
    description: >-
      SSL کے لیے استعمال ہونے والی نجی کلید کی فائل۔ فائل کو `/ssl/`
      ڈائریکٹری میں محفوظ کیا جانا چاہیے۔
  leave_front_door_open:
    name: سامنے کا دروازہ کھلا چھوڑ دیں
    description: >-
      فعال ہونے پر AdGuard Home پر تصدیق کو غیر فعال کر دیتا ہے۔ ہم سختی سے
      مشورہ دیتے ہیں کہ اسے فعال نہ کریں، چاہے کسی اندرونی نیٹ ورک پر ہی کیوں
      نہ ہو۔ اپنے خطرے پر استعمال کریں!
network:
  53/udp:
    description: DNS سرور پورٹ
  80/tcp:
    description: ویب انٹرفیس (Ingress کے لیے ضروری نہیں)
