---
configuration:
  log_level:
    name: Επίπεδο καταγραφής
    description: >-
      Ελέγχει το επίπεδο της εξόδου καταγραφής από την εφαρμογή και μπορεί να
      αλλάξει ώστε να είναι πιο αναλυτικό ή λιγότερο, κάτι που μπορεί να είναι
      χρήσιμο όταν αντιμετωπίζετε ένα άγνωστο πρόβλημα. Κάθε επίπεδο
      περιλαμβάνει αυτόματα τα μηνύματα ενός πιο σοβαρού επιπέδου.
  ssl:
    name: SSL
    description: >-
      Ενεργοποιεί/Απενεργοποιεί το κρυπτογραφημένο SSL (HTTPS) για άμεση
      πρόσβαση στην εφαρμογή. Αυτή η ρύθμιση δεν έχει καμία επίδραση στην
      υπηρεσία Ingress.
  certfile:
    name: Αρχείο πιστοποιητικού
    description: >-
      Το αρχείο πιστοποιητικού που θα χρησιμοποιηθεί για το SSL. Το αρχείο
      πρέπει να είναι αποθηκευμένο στον κατάλογο `/ssl/`.
  keyfile:
    name: Αρχείο ιδιωτικού κλειδιού
    description: >-
      Το αρχείο ιδιωτικού κλειδιού που θα χρησιμοποιηθεί για το SSL. Το αρχείο
      πρέπει να είναι αποθηκευμένο στον κατάλογο `/ssl/`.
  leave_front_door_open:
    name: Αφήστε την κεντρική πόρτα ανοιχτή
    description: >-
      Απενεργοποιεί τον έλεγχο ταυτότητας στο AdGuard Home όταν είναι
      ενεργοποιημένο. Συνιστούμε ανεπιφύλακτα να μην το ενεργοποιήσετε, ακόμη
      και σε ένα εσωτερικό δίκτυο. Χρήση με δική σας ευθύνη!
network:
  53/udp:
    description: Θύρα διακομιστή DNS
  80/tcp:
    description: Διεπαφή ιστού (δεν απαιτείται για το Ingress)
