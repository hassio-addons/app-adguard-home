---
configuration:
  log_level:
    name: ჟურნალის დონე
    description: >-
      აკონტროლებს აპლიკაციის ჟურნალის გამოტანის დონეს და შესაძლებელია მისი
      შეცვლა უფრო ან ნაკლებად დეტალურად, რაც შეიძლება სასარგებლო იყოს უცნობ
      პრობლემასთან მუშაობისას. თითოეული დონე ავტომატურად მოიცავს უფრო მძიმე
      დონის შეტყობინებებს.
  ssl:
    name: SSL
    description: >-
      ჩართავს/გამორთავს დაშიფრულ SSL-ს (HTTPS) აპლიკაციაზე პირდაპირი
      წვდომისთვის. ამ პარამეტრს გავლენა არ აქვს Ingress სერვისზე.
  certfile:
    name: სერტიფიკატის ფაილი
    description: >-
      SSL-ისთვის გამოსაყენებელი სერტიფიკატის ფაილი. ფაილი უნდა ინახებოდეს
      `/ssl/` დირექტორიაში.
  keyfile:
    name: პირადი გასაღების ფაილი
    description: >-
      SSL-ისთვის გამოსაყენებელი პირადი გასაღების ფაილი. ფაილი უნდა ინახებოდეს
      `/ssl/` დირექტორიაში.
  leave_front_door_open:
    name: დატოვეთ შესასვლელი კარი ღია
    description: >-
      ჩართვისას გამორთავს ავთენტიფიკაციას AdGuard Home-ზე. ჩვენ მკაცრად
      გირჩევთ, არ ჩართოთ ეს, თუნდაც შიდა ქსელში. გამოიყენეთ თქვენივე
      რისკით!
network:
  53/udp:
    description: DNS სერვერის პორტი
  80/tcp:
    description: ვებ ინტერფეისი (Ingress-ისთვის არ არის საჭირო)
