---
configuration:
  log_level:
    name: Մատյանի մակարդակ
    description: >-
      Կառավարում է հավելվածի կողմից մատյանի ելքի մակարդակը և կարող է փոխվել՝
      դառնալով ավելի կամ պակաս մանրամասն, ինչը կարող է օգտակար լինել, երբ դուք
      գործ ունեք անհայտ խնդրի հետ։ Յուրաքանչյուր մակարդակ ինքնաշխատ կերպով
      ներառում է ավելի լուրջ մակարդակի հաղորդագրությունները։
  ssl:
    name: SSL
    description: >-
      Միացնում/Անջատում է գաղտնագրված SSL (HTTPS) կապը հավելվածին ուղիղ
      մուտքի համար։ Այս կարգավորումը ազդեցություն չունի Ingress ծառայության
      վրա։
  certfile:
    name: Վկայագրի ֆայլ
    description: >-
      SSL-ի համար օգտագործվող վկայագրի ֆայլը։ Ֆայլը պետք է պահվի `/ssl/`
      գրացուցակում։
  keyfile:
    name: Մասնավոր բանալու ֆայլ
    description: >-
      SSL-ի համար օգտագործվող մասնավոր բանալու ֆայլը։ Ֆայլը պետք է պահվի
      `/ssl/` գրացուցակում։
  leave_front_door_open:
    name: Թողնել մուտքի դուռը բաց
    description: >-
      Միացնելու դեպքում անջատում է AdGuard Home-ի նույնականացումը։ Մենք
      խստորեն խորհուրդ ենք տալիս չմիացնել սա, նույնիսկ ներքին ցանցում։
      Օգտագործեք ձեր սեփական ռիսկով։
network:
  53/udp:
    description: DNS սերվերի միացք
  80/tcp:
    description: Վեբ ինտերֆեյս (Ingress-ի համար պարտադիր չէ)
