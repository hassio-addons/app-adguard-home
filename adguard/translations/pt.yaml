---
configuration:
  log_level:
    name: Nível de registo
    description: >-
      Controla o nível de saída do registo da aplicação e pode ser alterado
      para ser mais ou menos detalhado, o que pode ser útil quando está a
      lidar com um problema desconhecido. Cada nível inclui automaticamente
      as mensagens de um nível mais grave.
  ssl:
    name: SSL
    description: >-
      Ativa/desativa o SSL encriptado (HTTPS) para acesso direto à aplicação.
      Esta definição não tem efeito no serviço Ingress.
  certfile:
    name: Ficheiro de certificado
    description: >-
      O ficheiro de certificado a utilizar para SSL. O ficheiro deve estar
      guardado no diretório `/ssl/`.
  keyfile:
    name: Ficheiro de chave privada
    description: >-
      O ficheiro de chave privada a utilizar para SSL. O ficheiro deve estar
      guardado no diretório `/ssl/`.
  leave_front_door_open:
    name: Deixar a porta da frente aberta
    description: >-
      Desativa a autenticação no AdGuard Home quando ativado. Desaconselhamos
      vivamente que ative esta opção, mesmo numa rede interna. Utilize por
      sua conta e risco!
network:
  53/udp:
    description: Porta do servidor DNS
  80/tcp:
    description: Interface web (não necessária para Ingress)
