---
configuration:
  log_level:
    name: பதிவு நிலை
    description: >-
      செயலியின் பதிவு வெளியீட்டின் நிலையைக் கட்டுப்படுத்துகிறது, மேலும்
      அதிகமாகவோ அல்லது குறைவாகவோ விரிவாக இருக்கும்படி மாற்றலாம், இது அறியப்படாத
      சிக்கலைக் கையாளும்போது பயனுள்ளதாக இருக்கும். ஒவ்வொரு நிலையும்
      தீவிரமான நிலையின் செய்திகளைத் தானாகவே உள்ளடக்கியிருக்கும்.
  ssl:
    name: SSL
    description: >-
      செயலியை நேரடியாக அணுகுவதற்கு குறியாக்கம் செய்யப்பட்ட SSL (HTTPS) ஐ
      இயக்குகிறது/முடக்குகிறது. இந்த அமைப்பு Ingress சேவையில் எந்த
      விளைவையும் ஏற்படுத்தாது.
  certfile:
    name: சான்றிதழ் கோப்பு
    description: >-
      SSL க்காகப் பயன்படுத்த வேண்டிய சான்றிதழ் கோப்பு. கோப்பு `/ssl/`
      கோப்பகத்தில் சேமிக்கப்பட வேண்டும்.
  keyfile:
    name: தனிப்பட்ட விசை கோப்பு
    description: >-
      SSL க்காகப் பயன்படுத்த வேண்டிய தனிப்பட்ட விசை கோப்பு. கோப்பு `/ssl/`
      கோப்பகத்தில் சேமிக்கப்பட வேண்டும்.
  leave_front_door_open:
    name: முன் கதவைத் திறந்தே விடுங்கள்
    description: >-
      இயக்கப்படும்போது AdGuard Home இல் அங்கீகாரத்தை முடக்குகிறது. உள்
      நெட்வொர்க்கில் கூட இதை இயக்க வேண்டாம் என்று நாங்கள் கடுமையாக
      அறிவுறுத்துகிறோம். உங்கள் சொந்த ஆபத்தில் பயன்படுத்துங்கள்!
network:
  53/udp:
    description: DNS சேவையக போர்ட்
  80/tcp:
    description: இணைய இடைமுகம் (Ingress க்கு தேவையில்லை)
