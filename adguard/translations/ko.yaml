---
configuration:
  log_level:
    name: 로그 수준
    description: >-
      앱의 로그 출력 수준을 제어하며, 더 자세하거나 덜 자세하게 변경할 수
      있습니다. 이는 알 수 없는 문제를 처리할 때 유용할 수 있습니다. 각
      수준은 더 심각한 수준의 메시지를 자동으로 포함합니다.
  ssl:
    name: SSL
    description: >-
      앱에 직접 접근하기 위한 암호화된 SSL (HTTPS)을 활성화/비활성화합니다.
      이 설정은 Ingress 서비스에 영향을 주지 않습니다.
  certfile:
    name: 인증서 파일
    description: >-
      SSL에 사용할 인증서 파일입니다. 파일은 `/ssl/` 디렉터리에 저장해야
      합니다.
  keyfile:
    name: 개인 키 파일
    description: >-
      SSL에 사용할 개인 키 파일입니다. 파일은 `/ssl/` 디렉터리에 저장해야
      합니다.
  leave_front_door_open:
    name: 현관문 열어 두기
    description: >-
      활성화하면 AdGuard Home의 인증을 비활성화합니다. 내부 네트워크에서도
      이 기능을 활성화하지 않을 것을 강력히 권장합니다. 사용에 따른 책임은
      본인에게 있습니다!
network:
  53/udp:
    description: DNS 서버 포트
  80/tcp:
    description: 웹 인터페이스 (Ingress에는 필요하지 않음)
