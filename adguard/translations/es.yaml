---
configuration:
  log_level:
    name: Nivel de registro
    description: >-
      Controla el nivel de salida de registro de la aplicación y se puede
      cambiar para que sea más o menos detallado, lo que puede resultar útil
      cuando se enfrenta a un problema desconocido. Cada nivel incluye
      automáticamente los mensajes de un nivel más grave.
  ssl:
    name: SSL
    description: >-
      Activa/Desactiva el SSL cifrado (HTTPS) para el acceso directo a la
      aplicación. Esta configuración no tiene efecto sobre el servicio
      Ingress.
  certfile:
    name: Archivo de certificado
    description: >-
      El archivo de certificado que se utilizará para SSL. El archivo debe
      almacenarse en el directorio `/ssl/`.
  keyfile:
    name: Archivo de clave privada
    description: >-
      El archivo de clave privada que se utilizará para SSL. El archivo debe
      almacenarse en el directorio `/ssl/`.
  leave_front_door_open:
    name: Dejar la puerta principal abierta
    description: >-
      Desactiva la autenticación en AdGuard Home cuando está habilitado.
      Recomendamos encarecidamente no habilitar esto, incluso en una red
      interna. ¡Úselo bajo su propia responsabilidad!
network:
  53/udp:
    description: Puerto del servidor DNS
  80/tcp:
    description: Interfaz web (no necesaria para Ingress)
