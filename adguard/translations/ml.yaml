---
configuration:
  log_level:
    name: ലോഗ് ലെവൽ
    description: >-
      ആപ്പിന്റെ ലോഗ് ഔട്ട്പുട്ടിന്റെ നില നിയന്ത്രിക്കുകയും അത് കൂടുതലോ കുറവോ
      വിശദമായതാക്കാൻ മാറ്റാവുന്നതുമാണ്, അജ്ഞാതമായ ഒരു പ്രശ്നം കൈകാര്യം
      ചെയ്യുമ്പോൾ ഇത് ഉപയോഗപ്രദമായേക്കാം. ഓരോ ലെവലും കൂടുതൽ ഗുരുതരമായ
      ലെവലിന്റെ സന്ദേശങ്ങൾ സ്വയമേവ ഉൾപ്പെടുത്തുന്നു.
  ssl:
    name: SSL
    description: >-
      ആപ്പിലേക്കുള്ള നേരിട്ടുള്ള പ്രവേശനത്തിനായി എൻക്രിപ്റ്റ് ചെയ്ത SSL
      (HTTPS) പ്രവർത്തനക്ഷമമാക്കുന്നു/പ്രവർത്തനരഹിതമാക്കുന്നു. ഈ ക്രമീകരണത്തിന്
      Ingress സേവനത്തിൽ ഫലമൊന്നുമില്ല.
  certfile:
    name: സർട്ടിഫിക്കറ്റ് ഫയൽ
    description: >-
      SSL-നായി ഉപയോഗിക്കേണ്ട സർട്ടിഫിക്കറ്റ് ഫയൽ. ഫയൽ `/ssl/`
      ഡയറക്ടറിയിൽ സംഭരിച്ചിരിക്കണം.
  keyfile:
    name: പ്രൈവറ്റ് കീ ഫയൽ
    description: >-
      SSL-നായി ഉപയോഗിക്കേണ്ട പ്രൈവറ്റ് കീ ഫയൽ. ഫയൽ `/ssl/`
      ഡയറക്ടറിയിൽ സംഭരിച്ചിരിക്കണം.
  leave_front_door_open:
    name: മുൻവാതിൽ തുറന്നിടുക
    description: >-
      പ്രവർത്തനക്ഷമമാക്കുമ്പോൾ AdGuard Home-ലെ പ്രാമാണീകരണം
      പ്രവർത്തനരഹിതമാക്കുന്നു. ഒരു ആന്തരിക ശൃംഖലയിൽ പോലും ഇത്
      പ്രവർത്തനക്ഷമമാക്കുന്നതിനെതിരെ ഞങ്ങൾ ശക്തമായി ഉപദേശിക്കുന്നു. സ്വന്തം
      ഉത്തരവാദിത്തത്തിൽ ഉപയോഗിക്കുക!
network:
  53/udp:
    description: DNS സെർവർ പോർട്ട്
  80/tcp:
    description: വെബ് ഇന്റർഫേസ് (Ingress-നായി ആവശ്യമില്ല)
