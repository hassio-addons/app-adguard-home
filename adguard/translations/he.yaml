---
configuration:
  log_level:
    name: רמת יומן
    description: >-
      שולט ברמת פלט היומן של היישום וניתן לשנותו כך שיהיה מפורט יותר או פחות,
      מה שעשוי להיות שימושי כאשר אתה מתמודד עם בעיה לא ידועה. כל רמה כוללת
      באופן אוטומטי את ההודעות של רמה חמורה יותר.
  ssl:
    name: SSL
    description: >-
      מפעיל/משבית SSL מוצפן (HTTPS) לגישה ישירה אל היישום. להגדרה זו אין השפעה
      על שירות ה-Ingress.
  certfile:
    name: קובץ אישור
    description: >-
      קובץ האישור שישמש עבור SSL. יש לאחסן את הקובץ בספרייה `/ssl/`.
  keyfile:
    name: קובץ מפתח פרטי
    description: >-
      קובץ המפתח הפרטי שישמש עבור SSL. יש לאחסן את הקובץ בספרייה `/ssl/`.
  leave_front_door_open:
    name: השאר את דלת הכניסה פתוחה
    description: >-
      משבית אימות ב-AdGuard Home כאשר מופעל. אנו ממליצים בחום שלא להפעיל זאת,
      אפילו ברשת פנימית. השימוש על אחריותך בלבד!
network:
  53/udp:
    description: יציאת שרת DNS
  80/tcp:
    description: ממשק אינטרנט (לא נדרש עבור Ingress)
