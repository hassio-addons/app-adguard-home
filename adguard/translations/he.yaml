---
configuration:
  log_level:
    name: רמת לוג
    description: >-
      שולט ברמת פלט הלוג של היישום וניתן לשנות אותו להיות
      מפורט יותר או פחות, מה שעשוי להיות שימושי כאשר מתמודדים עם
      בעיה לא מוכרת. כל רמה כוללת אוטומטית את ההודעות של רמה
      חמורה יותר.
  ssl:
    name: SSL
    description: >-
      מפעיל/משבית SSL מוצפן (HTTPS) לגישה ישירה ליישום.
      הגדרה זו אינה משפיעה על שירות ההטמעה.
  certfile:
    name: קובץ אישור
    description: >-
      קובץ האישור לשימוש עבור SSL. הקובץ חייב להיות מאוחסן בתיקייה
      `/ssl/`.
  keyfile:
    name: קובץ מפתח פרטי
    description: >-
      קובץ המפתח הפרטי לשימוש עבור SSL. הקובץ חייב להיות מאוחסן בתיקייה
      `/ssl/`.
  leave_front_door_open:
    name: השאר את הדלת הקדמית פתוחה
    description: >-
      משבית אימות ב-AdGuard Home כאשר מופעל. אנו ממליצים בחום
      נגד הפעלת אפשרות זו, אפילו ברשת פנימית. השימוש על אחריותך בלבד!
network:
  53/udp:
    description: פתחת שרת DNS
  80/tcp:
    description: ממשק אינטרנט (לא נדרש עבור הטמעה)
