---
configuration:
  log_level:
    name: Ниво на журнала
    description: >-
      Контролира нивото на изходните данни в журнала от приложението и може да
      бъде променено да бъде по-подробно или по-малко подробно, което може да е
      полезно, когато се справяте с неизвестен проблем. Всяко ниво автоматично
      включва съобщенията от по-сериозно ниво.
  ssl:
    name: SSL
    description: >-
      Активира/деактивира криптиран SSL (HTTPS) за директен достъп до
      приложението. Тази настройка няма ефект върху услугата Ingress.
  certfile:
    name: Файл със сертификат
    description: >-
      Файлът със сертификат, който да се използва за SSL. Файлът трябва да бъде
      съхранен в директорията `/ssl/`.
  keyfile:
    name: Файл с частен ключ
    description: >-
      Файлът с частен ключ, който да се използва за SSL. Файлът трябва да бъде
      съхранен в директорията `/ssl/`.
  leave_front_door_open:
    name: Оставяне на входната врата отворена
    description: >-
      Деактивира удостоверяването в AdGuard Home, когато е активирано.
      Настоятелно съветваме да не активирате това, дори във вътрешна мрежа.
      Използвайте на свой собствен риск!
network:
  53/udp:
    description: Порт на DNS сървъра
  80/tcp:
    description: Уеб интерфейс (не е необходим за Ingress)
