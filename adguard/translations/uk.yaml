---
configuration:
  log_level:
    name: Рівень журналювання
    description: >-
      Керує рівнем виводу журналу застосунком і може бути змінений на більш
      або менш докладний, що може бути корисним, коли ви маєте справу з
      невідомою проблемою. Кожен рівень автоматично включає повідомлення
      більш серйозного рівня.
  ssl:
    name: SSL
    description: >-
      Вмикає/вимикає зашифрований SSL (HTTPS) для прямого доступу до
      застосунку. Це налаштування не впливає на службу Ingress.
  certfile:
    name: Файл сертифіката
    description: >-
      Файл сертифіката, який використовується для SSL. Файл має зберігатися
      в каталозі `/ssl/`.
  keyfile:
    name: Файл приватного ключа
    description: >-
      Файл приватного ключа, який використовується для SSL. Файл має
      зберігатися в каталозі `/ssl/`.
  leave_front_door_open:
    name: Залишити вхідні двері відчиненими
    description: >-
      Вимикає автентифікацію в AdGuard Home, коли увімкнено. Ми наполегливо
      радимо не вмикати це, навіть у внутрішній мережі. Використовуйте на
      власний ризик!
network:
  53/udp:
    description: Порт DNS-сервера
  80/tcp:
    description: Веб-інтерфейс (не потрібен для Ingress)
